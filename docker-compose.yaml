# ---------------------------------------------------------------------------
# Para subir o ambiente:
#   1. cp .env_example .env   (preencher as variáveis)
#   2. echo "AIRFLOW_UID=$(id -u)" >> .env
#   3. docker compose up --build
#   4. API disponível em:       http://localhost:8000/docs
#   5. Airflow disponível em:   http://localhost:8080  (usuário: airflow / senha: airflow)
#   6. Logs em tempo real:      http://localhost:8888  (Dozzle)
#   7. Banco via pgAdmin:       http://localhost:5050
# ---------------------------------------------------------------------------

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1
  user: "${AIRFLOW_UID:-50000}:0"
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${DATABASE_USER}:${DATABASE_PASS}@db_processing/${DATABASE_NAME}
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    # Variáveis repassadas aos DAGs para acesso ao projeto ML
    ML_API_URL: http://api_processing:8000
    ML_PROJECT_ROOT: /opt/airflow/ml_project
    ML_CODE_ROOT: /opt/airflow/ml_code
    # Artefatos de treino no volume compartilhado (API monta o mesmo volume em /var/www/ml_shared)
    PATH_DATA: /opt/airflow/ml_project
    PATH_DATA_PREPROCESSED: /opt/airflow/ml_project/pre_processed
    PATH_MODEL: /opt/airflow/ml_project/models
    PATH_GRAPHS: /opt/airflow/ml_project/graphs
    PATH_LOGS: logs
    PATH_MAINTENANCE_REPORTS: /opt/airflow/ml_project/reports
    MLFLOW_TRACKING_URI: sqlite:////opt/airflow/ml_project/mlflow.db
    MLFLOW_ARTIFACT_ROOT: /opt/airflow/ml_project/mlruns
    DATABASE_USER: ${DATABASE_USER}
    DATABASE_PASS: ${DATABASE_PASS}
    DATABASE_SERVER: db_processing
    DATABASE_PORT: ${DATABASE_PORT}
    DATABASE_NAME: ${DATABASE_NAME}
    AIRFLOW_UID: ${AIRFLOW_UID:-50000}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    # Volume nomeado evita Permission denied (UID airflow vs pasta no host)
    - airflow_logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    # Volume compartilhado entre API e Airflow (CSVs, logs dos tasks)
    - ml_shared:/opt/airflow/ml_project
    # Código Python alinhado ao layout ``src/`` da API (import services, core, …)
    - ./src:/opt/airflow/ml_code:ro
  depends_on:
    db_processing:
      condition: service_healthy
  networks:
    - nwprocessing

services:

  # ---------- Banco de dados PostgreSQL ------------------------------------
  db_processing:
    build:
      dockerfile: ./docker/db.dockerfile
      context: .
    image: processing_database:v1
    container_name: database_processing
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASS}
      POSTGRES_DB: ${DATABASE_NAME}
    ports:
      - "5432:5432"
    networks:
      - nwprocessing
    volumes:
      - pgdata:/var/lib/postgresql/data/
      - ./init_db:/docker-entrypoint-initdb.d/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- API FastAPI --------------------------------------------------
  api_processing:
    build:
      dockerfile: ./docker/api.dockerfile
      context: .
    image: processing_api:v1
    container_name: api_processing
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_SERVER: db_processing
    depends_on:
      db_processing:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - nwprocessing
    volumes:
      - api_data:/var/www/src/data
      - api_models:/var/www/src/artifacts/models
      - api_artifacts:/var/www/src/artifacts
      - api_logs:/var/www/logs
      - api_graphs:/var/www/src/graphs
      # Volume compartilhado com Airflow
      - ml_shared:/var/www/ml_shared

  # ---------- pgAdmin (interface web para o banco) -------------------------
  pgadmin:
    build:
      dockerfile: ./docker/pgadmin.dockerfile
      context: .
    image: pgadmin_db:v1
    container_name: pgadmin_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-changeme}
    ports:
      - "5050:80"
    depends_on:
      db_processing:
        condition: service_healthy
    networks:
      - nwprocessing

  # ---------- Dozzle (visualizador de logs dos containers) -----------------
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle_logs
    restart: unless-stopped
    ports:
      - "8888:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - nwprocessing

  # ---------- Airflow — inicialização (roda uma vez e encerra) -------------
  airflow-init:
    <<: *airflow-common
    container_name: airflow_init
    user: "0:0"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        mkdir -p /opt/airflow/logs/scheduler /opt/airflow/logs/dag_processor
        chown -R "${AIRFLOW_UID:-50000}:0" /opt/airflow/logs
        exec /entrypoint bash -c '
          airflow db migrate
          airflow users create --username airflow --password airflow --firstname Admin --lastname User --role Admin --email admin@example.com || true
        '
    restart: "no"

  # ---------- Airflow — scheduler ------------------------------------------
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler
    command: scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ---------- Airflow — webserver ------------------------------------------
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow_webserver
    command: webserver
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

# ---------------------------------------------------------------------------
networks:
  nwprocessing:
    name: "nwprocessing"
    driver: "bridge"

volumes:
  pgdata:
  api_data:
  api_models:
  api_artifacts:
  api_logs:
  api_graphs:
  ml_shared:
  airflow_logs:
